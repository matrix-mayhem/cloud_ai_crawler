name: Deploy AI Crawler

on:
  push:
    branches:
        - master
  workflow_dispatch:

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "."
          target: "/home/ubuntu/cloud_ai_crawler"

      - name: Build and deploy container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/cloud_ai_crawler

            echo "Stopping old container"
            sudo docker stop ai-crawler || true
            sudo docker rm ai-crawler || true

            echo "Building docker image"
            sudo docker build -t ai-crawler .
            sudo docker run -d -p 5000:5000 -e AWS_DEFAULT_REGION=ap-south-1 ai-crawler